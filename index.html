<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coupenzo.ai - AI Coupon Chatbot</title>
    <!-- Tailwind CSS for a beautiful, minimalist white design -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { background-color: #ffffff; font-family: sans-serif; }
    </style>
</head>
<body class="flex flex-col h-screen max-w-2xl mx-auto border-x border-gray-200">

    <!-- Header -->
    <header class="p-4 border-b border-gray-100 flex items-center justify-between">
        <h1 class="text-xl font-bold text-gray-800 tracking-tight">coupenzo<span class="text-emerald-500">.ai</span></h1>
        <span class="text-xs bg-emerald-50 text-emerald-600 px-2 py-1 rounded-full font-medium">Live Feed Active</span>
    </header>

    <!-- Chat Messages Area -->
    <main id="chat-box" class="flex-1 overflow-y-auto p-4 space-y-4">
        <!-- Initial Welcome Message -->
        <div class="flex items-start gap-2 max-w-[85%]">
            <div class="bg-gray-100 text-gray-800 rounded-2xl p-3 text-sm">
                👋 Hello! Welcome to Coupenzo.ai. Type any brand name (e.g., <span class="font-semibold text-emerald-600">hostinger</span>) to instantly find active discount codes and deals!
            </div>
        </div>
    </main>

    <!-- Input Form Bar -->
    <form id="chat-form" class="p-4 border-t border-gray-100 flex gap-2 bg-white sticky bottom-0">
        <input type="text" id="user-input" placeholder="Type a brand name here..." required
               class="flex-1 px-4 py-3 border border-gray-200 rounded-xl text-sm focus:outline-none focus:border-emerald-500 transition-colors">
        <button type="submit" 
                class="bg-emerald-500 text-white px-5 py-3 rounded-xl text-sm font-semibold hover:bg-emerald-600 transition-colors cursor-pointer">
            Search
        </button>
    </form>

    <script>
        // Note: For absolute beginners using single HTML files, we simulate the database check directly here.
        // You can easily add more brands to this list inside the brackets!
        const mockDatabase = {
            "hostinger": [
                { discount: "20% OFF", title: "Premium Web Hosting Sitewide Discount", code: "COUPENZO20", link: "https://www.hostinger.com" },
                { discount: "FREE DOMAIN", title: "Free Domain Registration with Annual Plans", code: "FREEDOMAIN", link: "https://www.hostinger.com" }
            ],
            "daraz": [
                { discount: "Rs. 500 OFF", title: "Mega Voucher Discount on Electronics", code: "DARAZ500", link: "https://www.daraz.pk" }
            ],
            "temu": [
                { discount: "30% OFF", title: "New User App Coupon Code", code: "TEMU30", link: "https://www.temu.com" }
            ]
        };

        const chatBox = document.getElementById('chat-box');
        const chatForm = document.getElementById('chat-form');
        const userInput = document.getElementById('user-input');

        chatForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const text = userInput.value.trim();
            if (!text) return;

            // 1. Append User Message
            appendMessage(text, true);
            userInput.value = '';

            // 2. Show Loading Skeleton Simulation
            const loadingId = appendLoading();
            chatBox.scrollTop = chatBox.scrollHeight;

            // 3. Process search after a brief 800ms delay to feel like a real AI search
            setTimeout(() => {
                document.getElementById(loadingId).remove();
                const cleanBrand = text.toLowerCase().trim();
                const coupons = mockDatabase[cleanBrand];

                if (coupons && coupons.length > 0) {
                    appendMessage(`Here are the latest verified offers found for **${text}**:`, false);
                    coupons.forEach(coupon => appendCouponCard(coupon));
                } else {
                    appendMessage(`Sorry, I couldn't find any active coupons for "${text}" right now. Try typing <span class="font-semibold text-emerald-600">hostinger</span> or <span class="font-semibold text-emerald-600">temu</span>!`, false);
                }
                chatBox.scrollTop = chatBox.scrollHeight;
            }, 800);
        });

        function appendMessage(text, isUser) {
            const wrapper = document.createElement('div');
            wrapper.className = isUser ? "flex items-start justify-end gap-2" : "flex items-start gap-2 max-w-[85%]";
            
            const msg = document.createElement('div');
            msg.className = isUser ? "bg-emerald-500 text-white rounded-2xl p-3 text-sm max-w-[85%]" : "bg-gray-100 text-gray-800 rounded-2xl p-3 text-sm";
            msg.innerHTML = text;
            
            wrapper.appendChild(msg);
            chatBox.appendChild(wrapper);
        }

        function appendLoading() {
            const id = 'loading-' + Date.now();
            const wrapper = document.createElement('div');
            wrapper.id = id;
            wrapper.className = "flex items-start gap-2 animate-pulse";
            wrapper.innerHTML = `<div class="bg-gray-100 text-gray-400 rounded-2xl p-3 text-sm">Searching active database...</div>`;
            chatBox.appendChild(wrapper);
            return id;
        }

        function appendCouponCard(coupon) {
            const card = document.createElement('div');
            card.className = "border border-gray-200 rounded-2xl p-4 bg-white max-w-[85%] ml-7 shadow-sm transition-all hover:shadow-md border-l-4 border-l-emerald-500 my-2";
            card.innerHTML = `
                <div class="flex items-center justify-between mb-1">
                    <span class="text-emerald-600 font-extrabold text-base tracking-wide">${coupon.discount}</span>
                    <span class="text-[10px] text-gray-400 font-medium bg-gray-50 px-2 py-0.5 rounded border border-gray-100">VERIFIED TODAY</span>
                </div>
                <h3 class="text-sm font-semibold text-gray-800 mb-3">${coupon.title}</h3>
                <div class="flex gap-2 items-center">
                    <div onclick="navigator.clipboard.writeText('${coupon.code}'); alert('Code copied to clipboard! Opening store...'); window.open('${coupon.link}', '_blank');" 
                         class="flex-1 border-2 border-dashed border-gray-200 hover:border-emerald-500 rounded-xl p-2 text-center font-mono font-bold text-gray-700 bg-gray-50 text-xs cursor-pointer select-none transition-colors">
                        ${coupon.code}
                    </div>
                    <a href="${coupon.link}" target="_blank" class="bg-gray-900 text-white text-xs font-semibold px-3 py-2.5 rounded-xl hover:bg-gray-800 transition-colors shrink-0">
                        Open Link
                    </a>
                </div>
            `;
            chatBox.appendChild(card);
        }
    </script>
</body>
</html>

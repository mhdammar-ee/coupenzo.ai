<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coupenzo.ai - AI Coupon Chatbot</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { background-color: #ffffff; font-family: sans-serif; }
    </style>
</head>
<body class="flex flex-col h-screen max-w-2xl mx-auto border-x border-gray-200">

    <header class="p-4 border-b border-gray-100 flex items-center justify-between">
        <h1 class="text-xl font-bold text-gray-800 tracking-tight">coupenzo<span class="text-emerald-500">.ai</span></h1>
        <span class="text-xs bg-emerald-50 text-emerald-600 px-2 py-1 rounded-full font-medium">Gemini 1.5 Flash Live</span>
    </header>

    <main id="chat-box" class="flex-1 overflow-y-auto p-4 space-y-4">
        <div class="flex items-start gap-2 max-w-[85%]">
            <div class="bg-gray-100 text-gray-800 rounded-2xl p-3 text-sm">
                👋 Hello! Welcome to Coupenzo.ai. Ask me about any brand (e.g., "Do you have any discount for hostinger?"). I will analyze our system and give you real-time matching deals!
            </div>
        </div>
    </main>

    <form id="chat-form" class="p-4 border-t border-gray-100 flex gap-2 bg-white sticky bottom-0">
        <input type="text" id="user-input" placeholder="Ask Gemini about a brand..." required
               class="flex-1 px-4 py-3 border border-gray-200 rounded-xl text-sm focus:outline-none focus:border-emerald-500 transition-colors">
        <button type="submit" 
                class="bg-emerald-500 text-white px-5 py-3 rounded-xl text-sm font-semibold hover:bg-emerald-600 transition-colors cursor-pointer">
            Ask AI
        </button>
    </form>

   <script>
        // 1. MAKE SURE YOU REPLACE THIS WITH A REAL KEY STARTING WITH "AIzaSy"
        const GEMINI_API_KEY = "AQ.Ab8RN6Kwtxoic5o3_bQxeUbpG7XiJTm5ohcL4vypOfQkBiu_QA"; 

        // Live local database feed
        const localDatabase = [
            { brand: "hostinger", discount: "20% OFF", title: "Premium Web Hosting Sitewide Discount", code: "COUPENZO20", link: "https://www.hostinger.com" },
            { brand: "hostinger", discount: "FREE DOMAIN", title: "Free Domain Registration with Annual Plans", code: "FREEDOMAIN", link: "https://www.hostinger.com" },
            { brand: "daraz", discount: "Rs. 500 OFF", title: "Mega Voucher Discount on Electronics", code: "DARAZ500", link: "https://www.daraz.pk" },
            { brand: "temu", discount: "30% OFF", title: "New User App Coupon Code", code: "TEMU30", link: "https://www.temu.com" }
        ];

        const chatBox = document.getElementById('chat-box');
        const chatForm = document.getElementById('chat-form');
        const userInput = document.getElementById('user-input');

        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const queryText = userInput.value.trim();
            if (!queryText) return;

            // Append User Message
            appendMessage(queryText, true);
            userInput.value = '';

            // Show Loading State
            const loadingId = appendLoading();
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                // Call Google Gemini API
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{
                            parts: [{
                                text: `You are Coupenzo.ai, an advanced coupon assistant. 
                                Here is our live coupon database file: ${JSON.stringify(localDatabase)}.
                                
                                User Query: "${queryText}"
                                
                                Task: Analyze the query and the database. Inform the user conversationally if we have the brand they want. 
                                CRITICAL: If a match is found, you MUST end your sentence response with a special tag string format like this: [RENDER_CARDS:brandname]. Replacing 'brandname' with the matching clean database brand text string (e.g., [RENDER_CARDS:hostinger]). If no match fits, explain politely.`
                            }]
                        }]
                    })
                });

                const resData = await response.json();
                
                // Safely remove loading element
                const loadingEl = document.getElementById(loadingId);
                if (loadingEl) loadingEl.remove();

                // If API key is bad, throw an error to jump to fallback database mode
                if (!response.ok || !resData.candidates) {
                    throw new Error("API Key Invalid");
                }

                let botReply = resData.candidates[0].content.parts[0].text;
                const cardRegex = /\[RENDER_CARDS:(\w+)\]/;
                const match = botReply.match(cardRegex);
                
                if (match) {
                    botReply = botReply.replace(cardRegex, '');
                    appendMessage(botReply, false);
                    renderCardsForBrand(match[1].toLowerCase());
                } else {
                    appendMessage(botReply, false);
                }

            } catch (err) {
                console.warn("Gemini API Error. Switching to direct database backup search...");
                
                // Remove loading element if still present
                const loadingEl = document.getElementById(loadingId);
                if (loadingEl) loadingEl.remove();

                // FALLBACK SAFETY MODE: Search database directly without AI
                const cleanBrand = queryText.toLowerCase().trim();
                let matchFound = false;

                localDatabase.forEach(item => {
                    if (cleanBrand.includes(item.brand) || item.brand.includes(cleanBrand)) {
                        if (!matchFound) {
                            appendMessage(`Welcome back! Here are the latest verified offers found for **${item.brand}**:`, false);
                            matchFound = true;
                        }
                        appendCouponCard(item);
                    }
                });

                if (!matchFound) {
                    appendMessage(`I couldn't find any active coupons for "${queryText}" right now. Try typing <span class="font-semibold text-emerald-600">hostinger</span> or <span class="font-semibold text-emerald-600">temu</span>!`, false);
                }
            }

            chatBox.scrollTop = chatBox.scrollHeight;
        });

        function renderCardsForBrand(matchedBrand) {
            localDatabase.forEach(item => {
                if (item.brand === matchedBrand) {
                    appendCouponCard(item);
                }
            });
        }

        function appendMessage(text, isUser) {
            const wrapper = document.createElement('div');
            wrapper.className = isUser ? "flex items-start justify-end gap-2" : "flex items-start gap-2 max-w-[85%]";
            const msg = document.createElement('div');
            msg.className = isUser ? "bg-emerald-500 text-white rounded-2xl p-3 text-sm max-w-[85%]" : "bg-gray-100 text-gray-800 rounded-2xl p-3 text-sm";
            msg.innerHTML = text.replace(/\n/g, '<br>');
            wrapper.appendChild(msg);
            chatBox.appendChild(wrapper);
        }

        function appendLoading() {
            const id = 'loading-' + Date.now();
            const wrapper = document.createElement('div');
            wrapper.id = id;
            wrapper.className = "flex items-start gap-2 animate-pulse";
            wrapper.innerHTML = `<div class="bg-gray-100 text-gray-400 rounded-2xl p-3 text-sm">Searching active offers...</div>`;
            chatBox.appendChild(wrapper);
            return id;
        }

        function appendCouponCard(coupon) {
            const card = document.createElement('div');
            card.className = "border border-gray-200 rounded-2xl p-4 bg-white max-w-[85%] ml-7 shadow-sm transition-all hover:shadow-md border-l-4 border-l-emerald-500 my-2";
            card.innerHTML = `
                <div class="flex items-center justify-between mb-1">
                    <span class="text-emerald-600 font-extrabold text-base tracking-wide">${coupon.discount}</span>
                    <span class="text-[10px] text-gray-400 font-medium bg-gray-50 px-2 py-0.5 rounded border border-gray-100">VERIFIED TODAY</span>
                </div>
                <h3 class="text-sm font-semibold text-gray-800 mb-3">${coupon.title}</h3>
                <div class="flex gap-2 items-center">
                    <div onclick="navigator.clipboard.writeText('${coupon.code}'); alert('Code copied! Redirecting store link...'); window.open('${coupon.link}', '_blank');" 
                         class="flex-1 border-2 border-dashed border-gray-200 hover:border-emerald-500 rounded-xl p-2 text-center font-mono font-bold text-gray-700 bg-gray-50 text-xs cursor-pointer select-none transition-colors">
                        ${coupon.code}
                    </div>
                    <a href="${coupon.link}" target="_blank" class="bg-gray-900 text-white text-xs font-semibold px-3 py-2.5 rounded-xl hover:bg-gray-800 transition-colors shrink-0">
                        Open Link
                    </a>
                </div>
            `;
            chatBox.appendChild(card);
        }
    </script>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coupenzo.ai - Live Coupon Chatbot</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #ffffff; font-family: sans-serif; }
    </style>
</head>
<body class="flex flex-col h-screen max-w-2xl mx-auto border-x border-gray-200">

    <header class="p-4 border-b border-gray-100 flex items-center justify-between">
        <h1 class="text-xl font-bold text-gray-800 tracking-tight">coupenzo<span class="text-emerald-500">.ai</span></h1>
        <span class="text-xs bg-emerald-50 text-emerald-600 px-2 py-1 rounded-full font-medium">Supabase Database Live</span>
    </header>

    <main id="chat-box" class="flex-1 overflow-y-auto p-4 space-y-4">
        <div class="flex items-start gap-2 max-w-[85%]">
            <div class="bg-gray-100 text-gray-800 rounded-2xl p-3 text-sm">
                👋 Hello! Welcome back to Coupenzo.ai. Type any brand name from your database (like <span class="font-semibold text-emerald-600">Geekbuying</span> or <span class="font-semibold text-emerald-600">Gamivo</span>) to instantly pull live deals and coupons!
            </div>
        </div>
    </main>

    <form id="chat-form" class="p-4 border-t border-gray-100 flex gap-2 bg-white sticky bottom-0">
        <input type="text" id="user-input" placeholder="Type a brand name..." required
               class="flex-1 px-4 py-3 border border-gray-200 rounded-xl text-sm focus:outline-none focus:border-emerald-500 transition-colors">
        <button type="submit" 
                class="bg-emerald-500 text-white px-5 py-3 rounded-xl text-sm font-semibold hover:bg-emerald-600 transition-colors cursor-pointer">
            Search
        </button>
    </form>

    <script>
        // 1. CONNECT TO YOUR LIVE SUPABASE PROJECT
        // Replace these placeholders with the actual Project URL and Anon Key from your Supabase ⚙️ Settings -> API tab
        const SUPABASE_URL = "https://your-supabase-project-url.supabase.co";
        const SUPABASE_ANON_KEY = "your-actual-supabase-anon-public-key";
        
        const supabase = Supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const chatBox = document.getElementById('chat-box');
        const chatForm = document.getElementById('chat-form');
        const userInput = document.getElementById('user-input');

        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const text = userInput.value.trim();
            if (!text) return;

            // Append User Message
            appendMessage(text, true);
            userInput.value = '';

            // Show Loading State
            const loadingId = appendLoading();
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                // STEP 1: Search the 'Stores' table for a matching name
                const { data: storeData, error: storeError } = await supabase
                    .from('Stores')
                    .select('id, name, tracking_ur')
                    .ilike('name', `%${text}%`) // Finds matches even with partial text or different capitalization
                    .single(); // Expect one matching store row

                if (storeError || !storeData) {
                    throw new Error("Store not found");
                }

                // STEP 2: Use the store's ID number to fetch all related entries from the 'Coupons' table
                const { data: coupons, error: couponError } = await supabase
                    .from('Coupons')
                    .select('name, offer, coupon_co, tracking_ur')
                    .eq('store', storeData.id); // Matches 'store' ID column from your image_8a7045.png

                // Remove loading element
                document.getElementById(loadingId).remove();

                if (couponError || !coupons || coupons.length === 0) {
                    appendMessage(`I found the store **${storeData.name}**, but there are no active coupon codes listed for it right now.`, false);
                    return;
                }

                // STEP 3: Print conversational reply and render the visual cards
                appendMessage(`Here are the latest verified offers found for **${storeData.name}**:`, false);
                
                coupons.forEach(coupon => {
                    // Fallback to store deep link if the coupon link itself is empty
                    const finalLink = coupon.tracking_ur || storeData.tracking_ur || "https://www.google.com";
                    
                    appendCouponCard({
                        discount: coupon.name || "DEAL",       // e.g. "20% OFF" from image_8a70a4
                        title: coupon.offer || "Special Deal", // e.g. "Enjoy 20% off your first order"
                        code: coupon.coupon_co || "GET DEAL",  // coupon code string
                        link: finalLink
                    });
                });

            } catch (err) {
                // Remove loading element if an error occurs
                const loadingEl = document.getElementById(loadingId);
                if (loadingEl) loadingEl.remove();

                console.error(err);
                appendMessage(`I couldn't find any active stores or coupons matching "${text}" in our database system right now.`, false);
            }

            chatBox.scrollTop = chatBox.scrollHeight;
        });

        function appendMessage(text, isUser) {
            const wrapper = document.createElement('div');
            wrapper.className = isUser ? "flex items-start justify-end gap-2" : "flex items-start gap-2 max-w-[85%]";
            const msg = document.createElement('div');
            msg.className = isUser ? "bg-emerald-500 text-white rounded-2xl p-3 text-sm max-w-[85%]" : "bg-gray-100 text-gray-800 rounded-2xl p-3 text-sm";
            msg.innerHTML = text;
            wrapper.appendChild(msg);
            chatBox.appendChild(wrapper);
        }

        function appendLoading() {
            const id = 'loading-' + Date.now();
            const wrapper = document.createElement('div');
            wrapper.id = id;
            wrapper.className = "flex items-start gap-2 animate-pulse";
            wrapper.innerHTML = `<div class="bg-gray-100 text-gray-400 rounded-2xl p-3 text-sm">Searching live relational database...</div>`;
            chatBox.appendChild(wrapper);
            return id;
        }

        function appendCouponCard(coupon) {
            const card = document.createElement('div');
            card.className = "border border-gray-200 rounded-2xl p-4 bg-white max-w-[85%] ml-7 shadow-sm transition-all hover:shadow-md border-l-4 border-l-emerald-500 my-2";
            card.innerHTML = `
                <div class="flex items-center justify-between mb-1">
                    <span class="text-emerald-600 font-extrabold text-base tracking-wide">${coupon.discount}</span>
                    <span class="text-[10px] text-gray-400 font-medium bg-gray-50 px-2 py-0.5 rounded border border-gray-100">VERIFIED TODAY</span>
                </div>
                <h3 class="text-sm font-semibold text-gray-800 mb-3">${coupon.title}</h3>
                <div class="flex gap-2 items-center">
                    <div onclick="navigator.clipboard.writeText('${coupon.code}'); alert('Code copied! Opening link tracking url...'); window.open('${coupon.link}', '_blank');" 
                         class="flex-1 border-2 border-dashed border-gray-200 hover:border-emerald-500 rounded-xl p-2 text-center font-mono font-bold text-gray-700 bg-gray-50 text-xs cursor-pointer select-none transition-colors">
                        ${coupon.code}
                    </div>
                    <a href="${coupon.link}" target="_blank" class="bg-gray-900 text-white text-xs font-semibold px-3 py-2.5 rounded-xl hover:bg-gray-800 transition-colors shrink-0">
                        Open Link
                    </a>
                </div>
            `;
            chatBox.appendChild(card);
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coupenzo.ai - Live Coupon Chatbot</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { background-color: #ffffff; font-family: sans-serif; }
    </style>
</head>
<body class="flex flex-col h-screen max-w-2xl mx-auto border-x border-gray-200">

    <header class="p-4 border-b border-gray-100 flex items-center justify-between">
        <h1 class="text-xl font-bold text-gray-800 tracking-tight">coupenzo<span class="text-emerald-500">.ai</span></h1>
        <span class="text-xs bg-emerald-50 text-emerald-600 px-2 py-1 rounded-full font-medium">Supabase Connected</span>
    </header>

    <main id="chat-box" class="flex-1 overflow-y-auto p-4 space-y-4">
        <div class="flex items-start gap-2 max-w-[85%]">
            <div class="bg-gray-100 text-gray-800 rounded-2xl p-3 text-sm">
                👋 Hello! Welcome back to Coupenzo.ai. Type any brand name from your database (like <span class="font-semibold text-emerald-600">Geekbuying</span> or <span class="font-semibold text-emerald-600">Gamivo</span>) to instantly pull live deals and coupons!
            </div>
        </div>
    </main>

    <form id="chat-form" class="p-4 border-t border-gray-100 flex gap-2 bg-white sticky bottom-0">
        <input type="text" id="user-input" placeholder="Type a brand name..." required
               class="flex-1 px-4 py-3 border border-gray-200 rounded-xl text-sm focus:outline-none focus:border-emerald-500 transition-colors">
        <button type="submit" 
                class="bg-emerald-500 text-white px-5 py-3 rounded-xl text-sm font-semibold hover:bg-emerald-600 transition-colors cursor-pointer">
            Search
        </button>
    </form>

    <script>
        // Setup credentials
        const myProjectUrl = "https://mjdarfyzednoohsiasgk.supabase.co";
        const myAnonKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1qZGFyZnl6ZWRub29oc2lhc2drIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI1NTU0MzEsImV4cCI6MjA5ODEzMTQzMX0.5lavKvNNmAZPEB_LVME1BgGNfC6J9uMHhvqQ9Oi6WXo";
        
        // This initialization is now entirely safe because the library script is in the HTML head block
        const dbClient = supabase.createClient(myProjectUrl, myAnonKey);

        const targetChatBox = document.getElementById('chat-box');
        const targetChatForm = document.getElementById('chat-form');
        const targetUserInput = document.getElementById('user-input');

        targetChatForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const searchPhrase = targetUserInput.value.trim();
            if (!searchPhrase) return;

            displayMessage(searchPhrase, true);
            targetUserInput.value = '';

            const loadingTrackerId = displayLoadingBubble();
            targetChatBox.scrollTop = targetChatBox.scrollHeight;

           try {
                // STEP 1: Search the 'Stores' table cleanly using explicit filter rules
                const { data: matchedStore, error: storeFetchError } = await dbClient
                    .from('Stores')
                    .select('id, name, tracking_ur')
                    .ilike('name', `%${searchPhrase}%`);

                // If Supabase throws an error or the array comes back completely empty
                if (storeFetchError || !matchedStore || matchedStore.length === 0) {
                    console.log("Detailed Debug Internal Store Error:", storeFetchError);
                    throw new Error("Store could not be found");
                }

                // Pick the first matching store row from the returned array list
                const currentStore = matchedStore[0];

                // STEP 2: Fetch related coupon cards from uppercase 'Coupons' table
                const { data: activeCoupons, error: couponFetchError } = await dbClient
                    .from('Coupons')
                    .select('name, offer, coupon_co, tracking_ur')
                    .eq('store', currentStore.id);

                // Clean up the running loader element bubble safely
                const loaderNode = document.getElementById(loadingTrackerId);
                if (loaderNode) loaderNode.remove();

                if (couponFetchError || !activeCoupons || activeCoupons.length === 0) {
                    displayMessage(`I found the store **${currentStore.name}** in our records, but there are no live coupon codes mapped to its ID row right now.`, false);
                    return;
                }

                // STEP 3: Map and display results cleanly
                displayMessage(`Here are the latest verified offers found for **${currentStore.name}**:`, false);
                
                activeCoupons.forEach(deal => {
                    // Safety check to use the store link if the individual coupon link field is null
                    const trackingLink = deal.tracking_ur || currentStore.tracking_ur || "https://www.google.com";
                    buildCouponUiCard({
                        discount: deal.name || "DEAL",       
                        title: deal.offer || "Special Offer", 
                        code: deal.coupon_co || "GET DEAL",  
                        link: trackingLink
                    });
                });

            } catch (runtimeError) {
                const loaderNode = document.getElementById(loadingTrackerId);
                if (loaderNode) loaderNode.remove();

                console.log("Console API Runtime Exception Tracer:", runtimeError);
                displayMessage(`I searched our database for "${searchPhrase}" but couldn't find a matching store. Check your spelling or table entries!`, false);
            }

            targetChatBox.scrollTop = targetChatBox.scrollHeight;
        });

        function displayMessage(textBody, isUserSender) {
            const rowWrapper = document.createElement('div');
            rowWrapper.className = isUserSender ? "flex items-start justify-end gap-2" : "flex items-start gap-2 max-w-[85%]";
            const messageBubble = document.createElement('div');
            messageBubble.className = isUserSender ? "bg-emerald-500 text-white rounded-2xl p-3 text-sm max-w-[85%]" : "bg-gray-100 text-gray-800 rounded-2xl p-3 text-sm";
            messageBubble.innerHTML = textBody;
            rowWrapper.appendChild(messageBubble);
            targetChatBox.appendChild(rowWrapper);
        }

        function displayLoadingBubble() {
            const targetId = 'load-' + Date.now();
            const loadingRow = document.createElement('div');
            loadingRow.id = targetId;
            loadingRow.className = "flex items-start gap-2 animate-pulse";
            loadingRow.innerHTML = `<div class="bg-gray-100 text-gray-400 rounded-2xl p-3 text-sm">Searching records...</div>`;
            targetChatBox.appendChild(loadingRow);
            return targetId;
        }

        function buildCouponUiCard(dataObject) {
            const templateCard = document.createElement('div');
            templateCard.className = "border border-gray-200 rounded-2xl p-4 bg-white max-w-[85%] ml-7 shadow-sm transition-all hover:shadow-md border-l-4 border-l-emerald-500 my-2";
            templateCard.innerHTML = `
                <div class="flex items-center justify-between mb-1">
                    <span class="text-emerald-600 font-extrabold text-base tracking-wide">${dataObject.discount}</span>
                    <span class="text-[10px] text-gray-400 font-medium bg-gray-50 px-2 py-0.5 rounded border border-gray-100">VERIFIED TODAY</span>
                </div>
                <h3 class="text-sm font-semibold text-gray-800 mb-3">${dataObject.title}</h3>
                <div class="flex gap-2 items-center">
                    <div onclick="navigator.clipboard.writeText('${dataObject.code}'); alert('Code copied to clipboard! Opening link...'); window.open('${dataObject.link}', '_blank');" 
                         class="flex-1 border-2 border-dashed border-gray-200 hover:border-emerald-500 rounded-xl p-2 text-center font-mono font-bold text-gray-700 bg-gray-50 text-xs cursor-pointer select-none transition-colors">
                        ${dataObject.code}
                    </div>
                    <a href="${dataObject.link}" target="_blank" class="bg-gray-900 text-white text-xs font-semibold px-3 py-2.5 rounded-xl hover:bg-gray-800 transition-colors shrink-0">
                        Open Link
                    </a>
                </div>
            `;
            targetChatBox.appendChild(templateCard);
        }
    </script>
</body>
</html>
